<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">MANTA application icon</title>
  <desc id="desc">A white manta ray on black with a subtle human head wearing a dense EEG electrode net.</desc>
  <defs>
    <radialGradient id="ray" cx="50%" cy="38%" r="62%">
      <stop offset="0" stop-color="#fff"/>
      <stop offset=".72" stop-color="#f7f7f8"/>
      <stop offset="1" stop-color="#dedee1"/>
    </radialGradient>
    <linearGradient id="head" x1=".25" y1="0" x2=".8" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity=".58"/>
      <stop offset=".65" stop-color="#d7d7da" stop-opacity=".34"/>
      <stop offset="1" stop-color="#aaaab0" stop-opacity=".18"/>
    </linearGradient>
    <radialGradient id="node" cx="38%" cy="30%" r="70%">
      <stop offset="0" stop-color="#fafafa"/>
      <stop offset=".35" stop-color="#777"/>
      <stop offset=".7" stop-color="#151515"/>
      <stop offset="1"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="rayShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#fff" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#000"/>

  <!-- Flattened manta silhouette with shortened tail. -->
  <path fill="url(#ray)" stroke="#fff" stroke-opacity=".72" stroke-width="3" filter="url(#rayShadow)"
    d="M158 470
       C190 382 255 329 330 271
       C398 218 414 180 425 116
       C430 87 450 72 460 88
       C451 126 447 143 459 151
       C484 171 539 171 565 151
       C577 142 573 126 564 88
       C574 72 594 87 599 116
       C610 180 626 218 694 271
       C769 329 834 382 866 470
       C811 434 756 403 698 414
       C637 425 601 476 572 536
       C564 553 552 565 542 555
       L530 543
       C524 550 523 584 527 622
       C533 684 552 745 523 821
       C517 838 511 850 504 861
       C518 813 525 777 520 741
       C514 697 500 657 497 620
       C494 584 499 551 494 543
       L482 555
       C472 565 460 553 452 536
       C423 476 387 425 326 414
       C268 403 213 434 158 470 Z"/>

  <!-- Barely perceptible face centered on the ray's back and turned left. -->
  <g transform="rotate(-15 502 358)" opacity=".62">
    <path fill="url(#head)" d="M445 303
      C452 259 487 235 530 245
      C572 255 596 292 590 338
      C586 371 568 397 546 420
      C526 440 492 437 475 413
      C464 397 461 379 451 366
      C438 349 438 326 445 303 Z"/>
    <path fill="none" stroke="#8e8e93" stroke-opacity=".3" stroke-width="3"
