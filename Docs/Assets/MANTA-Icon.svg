         M511 338 Q503 356 506 369 Q511 375 520 370
         M491 394 Q512 403 532 392"/>
    <path fill="none" stroke="#9a9aa0" stroke-opacity=".22" stroke-width="4"
      d="M456 341 Q445 337 446 350 Q449 365 461 369"/>
  </g>

  <!-- EEG net: dark embossed wiring with a dense array of electrodes. -->
  <g transform="rotate(-15 510 310)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#080808" stroke-width="10" opacity=".92">
      <path d="M420 331 Q431 273 471 235 Q514 205 557 229 Q590 250 605 299 Q612 336 591 377"/>
      <path d="M438 289 Q481 273 526 279 Q568 284 600 311"/>
      <path d="M429 318 Q474 305 519 311 Q565 316 604 344"/>
