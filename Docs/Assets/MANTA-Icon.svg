      <path d="M438 289 Q481 273 526 279 Q568 284 600 311"/>
      <path d="M429 318 Q474 305 519 311 Q565 316 604 344"/>
      <path d="M425 348 Q469 337 513 345 Q558 352 591 377"/>
      <path d="M457 255 Q452 301 451 348 M486 231 Q480 276 477 337
               M520 219 Q519 264 510 345 M551 225 Q554 278 543 353
               M578 247 Q590 290 575 366"/>
      <path d="M451 348 Q436 365 441 384 M543 353 Q556 371 550 394 M575 366 Q588 381 579 402"/>
    </g>
    <g fill="url(#node)" stroke="#050505" stroke-width="3">
      <circle cx="471" cy="235" r="9"/><circle cx="486" cy="231" r="9"/>
      <circle cx="520" cy="219" r="9"/><circle cx="551" cy="225" r="9"/>
      <circle cx="438" cy="289" r="9"/><circle cx="457" cy="255" r="9"/>
      <circle cx="478" cy="276" r="9"/><circle cx="519" cy="264" r="9"/>
      <circle cx="554" cy="278" r="9"/><circle cx="578" cy="247" r="9"/>
      <circle cx="600" cy="311" r="9"/><circle cx="420" cy="331" r="9"/>
      <circle cx="429" cy="318" r="9"/><circle cx="451" cy="305" r="9"/>
      <circle cx="477" cy="305" r="9"/><circle cx="510" cy="311" r="9"/>
      <circle cx="543" cy="314" r="9"/><circle cx="578" cy="326" r="9"/>
      <circle cx="604" cy="344" r="9"/><circle cx="425" cy="348" r="9"/>
      <circle cx="451" cy="348" r="9"/><circle cx="477" cy="337" r="9"/>
      <circle cx="510" cy="345" r="9"/><circle cx="543" cy="353" r="9"/>
      <circle cx="575" cy="366" r="9"/><circle cx="591" cy="377" r="9"/>
      <circle cx="441" cy="384" r="9"/><circle cx="550" cy="394" r="9"/>
      <circle cx="579" cy="402" r="9"/>
